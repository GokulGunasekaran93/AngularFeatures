<table border="1 px solid black">
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
    </tr>
  </thead>
  <tbody>
    @for (usr of user; track usr.id) {
      <tr>
        <td>{{ usr.id }}</td>
        <td>{{ usr.name }}</td>
      </tr>
    } @empty {
      <tr>
        <td colspan="2">No users found.</td>
      </tr>
    }
  </tbody>
</table>
